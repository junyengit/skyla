name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Bun version
        run: bun --revision

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Convex schema typecheck
        run: bun run convex:schema:typecheck

      - name: Convex functions typecheck
        run: bun run convex:functions:typecheck

      - name: Build
        run: bun run build

      - name: Tracked artifact guard
        run: bun run security:artifacts

      - name: Dependency audit
        run: bun run security:audit
